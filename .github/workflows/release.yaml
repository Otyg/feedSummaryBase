name: Release to PyPI + GitHub Releases

on:
  push:
    tags:
      - "v*"   # grov trigging; exakt semver filtreras i jobben

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distributions
    # Endast semver vX.Y.Z (inga suffix, inga extra segment)
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name =~ '^v[0-9]+\\.[0-9]+\\.[0-9]+$'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish_pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name =~ '^v[0-9]+\\.[0-9]+\\.[0-9]+$'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/feedsummary-core/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github_release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name =~ '^v[0-9]+\\.[0-9]+\\.[0-9]+$'
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*